<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — Taller</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body { background: linear-gradient(135deg, #2c3e50, #3498db); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
.login-card h4 { font-weight: 700; color: #2c3e50; }
.form-control:focus { border-color: #3498db; box-shadow: 0 0 0 .2rem rgba(52,152,219,.15); }
.btn-primary { background: #3498db; border: none; padding: .6rem; font-weight: 600; }
.btn-primary:hover { background: #2980b9; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🔧</div>
    <h4>Reparaciones</h4>
    <p class="text-muted small">Panel de control del taller</p>
  </div>
  {{if .Error}}<div class="alert alert-danger py-2 small">Usuario o contraseña incorrectos</div>{{end}}
  <form method="POST" action="/login">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Usuario</label>
      <input type="text" name="usuario" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Contraseña</label>
      <input type="password" name="clave" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>
</div>
</body>
</html>
