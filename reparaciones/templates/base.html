{{define "layout"}}<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Taller</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="/static/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="/" class="text-white text-decoration-none">
        <h5 class="mb-0"><i class="bi bi-tools"></i> Taller</h5>
        <small class="text-white-50">Control de reparaciones</small>
      </a>
    </div>
    <ul class="nav flex-column">
      <li class="nav-item"><a href="/" class="nav-link {{if eq .Active "dashboard"}}active{{end}}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a href="/kanban" class="nav-link {{if eq .Active "kanban"}}active{{end}}"><i class="bi bi-columns"></i> Kanban</a></li>
      <li class="nav-item"><a href="/nueva" class="nav-link {{if eq .Active "nueva"}}active{{end}}"><i class="bi bi-plus-circle"></i> Nuevo ingreso</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="/taller" target="_blank" class="text-white-50 small"><i class="bi bi-grid-3x3-gap"></i> TallerPro SPA</a>
      <a href="/" class="text-white-50 small d-block"><i class="bi bi-arrow-repeat"></i> RefacCel :8081</a>
    </div>
  </nav>
  <main class="main-content">
    <div class="topbar">
      <form action="/" method="GET" class="d-flex gap-2 flex-grow-1">
        <div class="input-group" style="max-width:400px">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
          <input type="text" name="q" class="form-control border-start-0" placeholder="Buscar cliente, equipo, serie..." value="{{.Query}}">
        </div>
        <select name="s" class="form-select" style="width:auto;max-width:160px" onchange="this.form.submit()">
          <option value="todas" {{if eq .StatusFilter "todas"}}selected{{end}}>Todas</option>
          <option value="recibido" {{if eq .StatusFilter "recibido"}}selected{{end}}>📥 Recibido</option>
          <option value="diagnosticando" {{if eq .StatusFilter "diagnosticando"}}selected{{end}}>🔍 Diagnosticando</option>
          <option value="presupuestado" {{if eq .StatusFilter "presupuestado"}}selected{{end}}>💰 Presupuestado</option>
          <option value="aprobado" {{if eq .StatusFilter "aprobado"}}selected{{end}}>✅ Aprobado</option>
          <option value="reparando" {{if eq .StatusFilter "reparando"}}selected{{end}}>🔧 Reparando</option>
          <option value="reparado" {{if eq .StatusFilter "reparado"}}selected{{end}}>✨ Reparado</option>
          <option value="entregado" {{if eq .StatusFilter "entregado"}}selected{{end}}>📦 Entregado</option>
          <option value="cancelado" {{if eq .StatusFilter "cancelado"}}selected{{end}}>❌ Cancelado</option>
        </select>
        <button type="submit" class="btn btn-primary d-none">Buscar</button>
      </form>
      <div class="d-flex align-items-center gap-2 ms-3">
        <span class="small text-muted">{{.User}}</span>
        <a href="/logout" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i></a>
        <a href="/nueva" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Nueva</a>
      </div>
    </div>

    <div class="p-3">
      {{if .Error}}<div class="alert alert-danger alert-dismissible fade show py-2">{{.Error}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{{end}}
      {{if .Success}}<div class="alert alert-success alert-dismissible fade show py-2">{{.Success}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>{{end}}
      {{block "content" .}}{{end}}
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>{{end}}
